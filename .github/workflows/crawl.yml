name: Run crawler

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python run.py

      - name: Show files
        run: |
          ls -la
          echo "----- output preview -----"
          head -50 output.json || true

      - name: Commit and push output.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.json
          git commit -m "Update output.json" || echo "No changes to commit"
          git push origin main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crawler-output
          path: output.json
